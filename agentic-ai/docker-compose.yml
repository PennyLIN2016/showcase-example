version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example

  web:
    build:
      context: ./web-ui
    volumes:
      - ./web-ui:/app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    command: npm run dev

networks:
  default:
    driver: bridge